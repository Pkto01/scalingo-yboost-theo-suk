<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Todo List Go</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1 data-text="Ma Todo List"><span>Ma Todo List</span></h1>
        <p>Propulsé par Go & MySQL sur Scalingo 🐹</p>

        <form action="/add" method="POST" class="todo-form">
            <input type="text" name="title" placeholder="Qu'y a-t-il à faire ?" required>
            <button type="submit">Ajouter</button>
        </form>

        <ul class="todo-list">
            {{ range .Todos }}
            <li class="{{ if .Completed }}completed{{ end }}">
                <div>
                    <span>{{ .Title }}</span>
                    <div class="group-button">
                        <form action="/done" method="POST" style="display:inline;">
                            <input type="hidden" name="id" value="{{ .ID }}">
                            <button type="submit" class="btn-done">✓</button>
                        </form>
                        <button type="button" class="btn-rename" onclick="handleRename('{{ .ID }}', '{{ .Title }}')">✎</button>
                        <form action="/delete" method="POST" style="display:inline;">
                            <input type="hidden" name="id" value="{{ .ID }}">
                            <button type="submit" class="btn-delete">✗</button>
                        </form>
                    </div>
                </div>
            </li>
            {{ else }}
            <li class="empty">Aucune tâche pour le moment ! 🎉</li>
            {{ end }}
        </ul>
    </div>
</body>
<script>
    function handleRename(id, currentTitle) {
        const newTitle = prompt("Renommez la tâche :", currentTitle);
        if (newTitle && newTitle.trim() !== "") {
            const form = document.createElement("form");
            form.method = "POST";
            form.action = "/rename";

            const idInput = document.createElement("input");
            idInput.type = "hidden";
            idInput.name = "id";
            idInput.value = id;
            form.appendChild(idInput);

            const titleInput = document.createElement("input");
            titleInput.type = "hidden";
            titleInput.name = "new_title";
            titleInput.value = newTitle.trim();
            form.appendChild(titleInput);

            document.body.appendChild(form);
            form.submit();
        }
    }
</script>
</html>
